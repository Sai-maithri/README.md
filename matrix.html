<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Matrix Operations</title>
    <link rel="stylesheet" href="matrix.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>Matrix Operations</h1>
            <p class="subtitle">Perform Addition, Subtraction & Multiplication on 2×2 Matrices</p>
        </header>

        <main>
            <section class="matrix-section">
                <h2>Matrix A</h2>
                <div class="matrix-input-grid">
                    <div class="input-group">
                        <label>a<sub>11</sub></label>
                        <input type="number" id="num_1" placeholder="0">
                    </div>
                    <div class="input-group">
                        <label>a<sub>12</sub></label>
                        <input type="number" id="num_2" placeholder="0">
                    </div>
                    <div class="input-group">
                        <label>a<sub>21</sub></label>
                        <input type="number" id="num_3" placeholder="0">
                    </div>
                    <div class="input-group">
                        <label>a<sub>22</sub></label>
                        <input type="number" id="num_4" placeholder="0">
                    </div>
                </div>
            </section>

            <section class="matrix-section">
                <h2>Matrix B</h2>
                <div class="matrix-input-grid">
                    <div class="input-group">
                        <label>b<sub>11</sub></label>
                        <input type="number" id="num_5" placeholder="0">
                    </div>
                    <div class="input-group">
                        <label>b<sub>12</sub></label>
                        <input type="number" id="num_6" placeholder="0">
                    </div>
                    <div class="input-group">
                        <label>b<sub>21</sub></label>
                        <input type="number" id="num_7" placeholder="0">
                    </div>
                    <div class="input-group">
                        <label>b<sub>22</sub></label>
                        <input type="number" id="num_8" placeholder="0">
                    </div>
                </div>
            </section>

            <section class="operations-section">
                <h2>Quick Operations</h2>
                <div class="button-group">
                    <button id="add" onclick="add()" class="btn btn-add">
                        <span class="icon">+</span> Add
                    </button>
                    <button id="sub" onclick="sub()" class="btn btn-sub">
                        <span class="icon">−</span> Subtract
                    </button>
                    <button id="mul" onclick="mul()" class="btn btn-mul">
                        <span class="icon">×</span> Multiply
                    </button>
                </div>
            </section>

            <section class="result-section">
                <h2>Result Matrix C</h2>
                <div class="matrix-input-grid result-grid">
                    <div class="input-group">
                        <label>c<sub>11</sub></label>
                        <input type="text" id="result1" placeholder="Result" readonly>
                    </div>
                    <div class="input-group">
                        <label>c<sub>12</sub></label>
                        <input type="text" id="result2" placeholder="Result" readonly>
                    </div>
                    <div class="input-group">
                        <label>c<sub>21</sub></label>
                        <input type="text" id="result3" placeholder="Result" readonly>
                    </div>
                    <div class="input-group">
                        <label>c<sub>22</sub></label>
                        <input type="text" id="result4" placeholder="Result" readonly>
                    </div>
                </div>
            </section>

            <hr>

            <section class="dropdown-section">
                <h2>Custom Operation</h2>
                <div class="select-group">
                    <label for="operation">Choose Operation:</label>
                    <select id="operation">
                        <option value="+">Addition (+)</option>
                        <option value="-">Subtraction (−)</option>
                        <option value="*">Multiplication (×)</option>
                    </select>
                    <button id="calculate" onclick="calculate()">Calculate</button>
                </div>
                <div class="result-output">
                    <h3>Answer</h3>
                    <div class="matrix-input-grid">
                        <input type="text" id="result_c11" placeholder="c₁₁" readonly>
                        <input type="text" id="result_c12" placeholder="c₁₂" readonly>
                        <input type="text" id="result_c21" placeholder="c₂₁" readonly>
                        <input type="text" id="result_c22" placeholder="c₂₂" readonly>
                    </div>
                </div>
            </section>
        </main>
    </div>
    <script src="matrix.js"></script>
</body>
</html>
